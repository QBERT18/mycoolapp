spring.application.name=mycoolapp

coach.name=John Doe
team.name=The A-Team

# Expose specific actuator endpoints
# management.endpoints.web.exposure.include=health,info,metrics

# To expose all actuator endpoints
management.endpoints.web.exposure.include=*

# To exclude specific endpoints, you can use the following property instead:
# management.endpoints.web.exposure.exclude=health,info,metrics

# To set a custom base path for actuator endpoints (default is /actuator)
# management.endpoints.web.base-path=/actuator

management.info.env.enabled=true

info.app.name=My Cool App
info.app.description=This is a cool application built with Spring Boot.
info.app.version=1.0.0

# override default security credentials
spring.security.user.name=admin
spring.security.user.password=admin

# To change the default server port (default is 8080)
# server.port=8081

# To set a custom context path for the application
# server.servlet.context-path=/myapp

# To configure session timeout (default is 30 minutes)
# server.servlet.session.timeout=30m

# Database configuration
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

